name: Deploy

on:
  workflow_dispatch:
    inputs:
      run_tests:
        description: Run the test suite before deploying.
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Test
        if: ${{ inputs.run_tests }}
        run: make test

      - name: Deploy
        run: make deploy
