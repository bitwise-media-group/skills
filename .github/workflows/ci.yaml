name: ci

on:
    push:
        branches: [main]
    pull_request:

jobs:
    skills:
        name: skills + manifests
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
            - uses: bitwise-media-group/setup-evolve@898d925c0307d9402eddfb70e31d84794e4d8e7e # v1
            - name: Tier 0 static checks
              run: evolve run checks --strict
            - name: Eval JSON well-formed
              run: |
                  for f in plugins/*/evals/*/*.json; do
                    jq -e . "$f" >/dev/null || { echo "invalid JSON: $f"; exit 1; }
                  done
            - name: Shell scripts parse
              run: sh -n install.sh

    markdown:
        name: markdown lint
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
            - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
              with:
                  node-version: 22
            - run: npx --yes markdownlint-cli2 "**/*.md"

    claude-validate:
        name: claude plugin validate
        runs-on: ubuntu-latest
        # Best-effort until the CLI is proven to run unauthenticated in CI;
        # promote to blocking once it has a green track record.
        continue-on-error: true
        steps:
            - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
            - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
              with:
                  node-version: 22
            - run: npm install -g @anthropic-ai/claude-code
            - run: claude plugin validate .
