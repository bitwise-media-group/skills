name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  skills:
    name: skills + manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: bitwise-media-group/setup-evolve@c1355d0d46a9ade667bd40c64e45ea838ab4daf8 # v1
      - name: Tier 0 static checks
        run: evolve run checks --strict
      - name: Shell scripts parse
        run: sh -n install.sh
