# Caller for the org's fast-forward merge flow — both `/merge` (merge an approved,
# green PR now) and set-and-forget auto-merge (`/auto-merge`, or add the
# `auto-merge` label, and it fast-forwards the moment it is approved and every
# required check is green) in one workflow. Both preserve each commit's signature
# via the same `ff-merge` action, so release-please still sees each Conventional
# Commit. This replaces the previous split merge.yaml + auto-merge.yaml — v3 unifies
# them into a single reusable workflow.
#
# Every trigger here is one that does NOT attach a check run to the PR
# (issue_comment, workflow_run, schedule), so the merge machinery leaves no
# skipped-job clutter on the PR's checks list. The approval signal is carried by the
# companion merge-review-ack.yaml (its single job is the only check this system
# adds) and re-enters via workflow_run. `ci` is this repo's only required PR check
# (evals.yml is workflow_dispatch-only); ff-merge re-verifies all checks regardless.
# The schedule sweeps armed PRs as a backstop.
#
# Prerequisites (one-time, org-wide — see bitwise-media-group/ff-merge):
#   - org variable FF_MERGE_CLIENT_ID and org secret FF_MERGE_PRIVATE_KEY
#   - the "FF Merge" App installed on this repo and in the ruleset bypass list

name: Merge

on:
    issue_comment:
        types: [created]
    workflow_run:
        workflows: [ci, "Merge Review Ack"]
        types: [completed]
    schedule:
        - cron: "17 * * * *"

# the App token does the privileged work; the job's GITHUB_TOKEN needs nothing
permissions: {}

jobs:
    merge:
        uses: bitwise-media-group/github-workflows/.github/workflows/merge.yaml@ef97ca56a3a90f9f35556402e0c7478307edcbb9 # v3.0.0
        with:
            app-client-id: ${{ vars.FF_MERGE_CLIENT_ID }}
        secrets:
            app-private-key: ${{ secrets.FF_MERGE_PRIVATE_KEY }}
